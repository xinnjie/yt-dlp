services:

  linux_x86_64:
    build:
      context: linux
      target: build
      platforms:
        - "linux/amd64"
      args:
        BUILDIMAGE: ghcr.io/yt-dlp/manylinux2014_x86_64-shared:latest
    environment:
      EXE_NAME: ${EXE_NAME:?}
      CHANNEL: ${CHANNEL:?}
      ORIGIN: ${ORIGIN:?}
      VERSION:
      PYTHON_VERSION:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../..:/yt-dlp

  linux_x86_64_verify:
    build:
      context: linux
      target: verify
      platforms:
        - "linux/amd64"
      args:
        VERIFYIMAGE: quay.io/pypa/manylinux2014_x86_64:2025.12.19-1@sha256:b716645f9aecd0c1418283af930804bbdbd68a73d855a60101c5aab8548d737d
    environment:
      EXE_NAME: ${EXE_NAME:?}
      UPDATE_TO:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../../dist:/build

  remote_server_linux_x86_64:
    image: ${REMOTE_SERVER_IMAGE_LINUX_X86_64:-yt-dlp-remote-server:linux-x86_64}
    build:
      context: ../..
      dockerfile: bundle/docker/remote_server/Dockerfile
      platforms:
        - "linux/amd64"
      args:
        BUILDIMAGE: ghcr.io/yt-dlp/manylinux2014_x86_64-shared:latest
        RUNTIMEIMAGE: python:3.13-slim
        PYTHON_VERSION: "3.13"

  remote_server_linux_x86_64_verify:
    image: ${REMOTE_SERVER_IMAGE_LINUX_X86_64:-yt-dlp-remote-server:linux-x86_64}
    platform: "linux/amd64"
    command: ["python3", "-m", "yt_dlp.remote.server", "--help"]

  remote_server_linux_aarch64:
    image: ${REMOTE_SERVER_IMAGE_LINUX_AARCH64:-yt-dlp-remote-server:linux-aarch64}
    build:
      context: ../..
      dockerfile: bundle/docker/remote_server/Dockerfile
      platforms:
        - "linux/arm64"
      args:
        BUILDIMAGE: ghcr.io/yt-dlp/manylinux2014_aarch64-shared:latest
        RUNTIMEIMAGE: python:3.13-slim
        PYTHON_VERSION: "3.13"

  remote_server_linux_aarch64_verify:
    image: ${REMOTE_SERVER_IMAGE_LINUX_AARCH64:-yt-dlp-remote-server:linux-aarch64}
    platform: "linux/arm64"
    command: ["python3", "-m", "yt_dlp.remote.server", "--help"]

  linux_aarch64:
    build:
      context: linux
      target: build
      platforms:
        - "linux/arm64"
      args:
        BUILDIMAGE: ghcr.io/yt-dlp/manylinux2014_aarch64-shared:latest
    environment:
      EXE_NAME: ${EXE_NAME:?}
      CHANNEL: ${CHANNEL:?}
      ORIGIN: ${ORIGIN:?}
      VERSION:
      PYTHON_VERSION:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../..:/yt-dlp

  linux_aarch64_verify:
    build:
      context: linux
      target: verify
      platforms:
        - "linux/arm64"
      args:
        VERIFYIMAGE: quay.io/pypa/manylinux2014_aarch64:2025.12.19-1@sha256:36cbe6638c7c605c2b44a92e35751baa537ec8902112f790139d89c7e1ccd2a4
    environment:
      EXE_NAME: ${EXE_NAME:?}
      UPDATE_TO:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../../dist:/build

  linux_armv7l:
    build:
      context: linux
      target: build
      platforms:
        - "linux/arm/v7"
      args:
        BUILDIMAGE: ghcr.io/yt-dlp/manylinux_2_31_armv7l-shared:latest
    environment:
      EXE_NAME: ${EXE_NAME:?}
      CHANNEL: ${CHANNEL:?}
      ORIGIN: ${ORIGIN:?}
      VERSION:
      PYTHON_VERSION:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../..:/yt-dlp
      - ../../venv:/yt-dlp-build-venv

  linux_armv7l_verify:
    build:
      context: linux
      target: verify
      platforms:
        - "linux/arm/v7"
      args:
        VERIFYIMAGE: arm32v7/debian:bullseye@sha256:9d544bf6ff73e36b8df1b7e415f6c8ee40ed84a0f3a26970cac8ea88b0ccf2ac
    environment:
      EXE_NAME: ${EXE_NAME:?}
      UPDATE_TO:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../../dist:/build

  musllinux_x86_64:
    build:
      context: linux
      target: build
      platforms:
        - "linux/amd64"
      args:
        BUILDIMAGE: ghcr.io/yt-dlp/musllinux_1_2_x86_64-shared:latest
    environment:
      EXE_NAME: ${EXE_NAME:?}
      CHANNEL: ${CHANNEL:?}
      ORIGIN: ${ORIGIN:?}
      VERSION:
      PYTHON_VERSION:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../..:/yt-dlp

  musllinux_x86_64_verify:
    build:
      context: linux
      target: verify
      platforms:
        - "linux/amd64"
      args:
        VERIFYIMAGE: alpine:3.23.2@sha256:865b95f46d98cf867a156fe4a135ad3fe50d2056aa3f25ed31662dff6da4eb62
    environment:
      EXE_NAME: ${EXE_NAME:?}
      UPDATE_TO:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../../dist:/build

  musllinux_aarch64:
    build:
      context: linux
      target: build
      platforms:
        - "linux/arm64"
      args:
        BUILDIMAGE: ghcr.io/yt-dlp/musllinux_1_2_aarch64-shared:latest
    environment:
      EXE_NAME: ${EXE_NAME:?}
      CHANNEL: ${CHANNEL:?}
      ORIGIN: ${ORIGIN:?}
      VERSION:
      PYTHON_VERSION:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
      EXCLUDE_CURL_CFFI: "1"
    volumes:
      - ../..:/yt-dlp

  musllinux_aarch64_verify:
    build:
      context: linux
      target: verify
      platforms:
        - "linux/arm64"
      args:
        VERIFYIMAGE: alpine:3.23.2@sha256:865b95f46d98cf867a156fe4a135ad3fe50d2056aa3f25ed31662dff6da4eb62
    environment:
      EXE_NAME: ${EXE_NAME:?}
      UPDATE_TO:
      SKIP_ONEDIR_BUILD:
      SKIP_ONEFILE_BUILD:
    volumes:
      - ../../dist:/build
