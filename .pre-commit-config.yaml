repos:
- repo: local
  hooks:
  - id: linter
    name: Apply linter fixes
    entry: bash -c 'ruff check --fix "$@"' --
    language: system
    types: [python]
    require_serial: true
  - id: format
    name: Apply formatting fixes
    entry: bash -c 'autopep8 --in-place "$@"' --
    language: system
    types: [python]
